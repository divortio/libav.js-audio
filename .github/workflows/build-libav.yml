name: Build Custom libav.js (All Audio & Demuxers)

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'vendor/libav.js/**'
      - '.github/workflows/build-libav.yml'
      - 'build_custom_libav.sh'
      - 'generate_fragments.js'
  workflow_dispatch:

jobs:
  build-libav:
    runs-on: ubuntu-latest
    container:
      image: emscripten/emsdk:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y pkg-config jq zip

      - name: Configure libav.js Build
        run: |
          echo "Generating customized FFmpeg fragments for libav.js setup..."
          cd vendor/libav.js/configs
          node ../../../generate_fragments.js > /tmp/frag.json
          node mkconfig.js audio "$(< /tmp/frag.json)"

      - name: Build libav.js (WASM + JS bindings)
        run: |
          cd vendor/libav.js
          echo "Compiling FFmpeg 8.0 natively to WebAssembly..."
          make build-audio

      - name: Package Engine Distributions
        run: |
          node package_builds.js 6.8.8.0 audio
          ls -la vendor/libav.js/dist/libav-6.8.8.0-audio/

      - name: Zip Engine Distributions
        run: |
          cd vendor/libav.js/dist/libav-6.8.8.0-audio/
          for engine in */ ; do
            engine_name=$(basename "$engine")
            zip -r "${engine_name}.zip" "$engine_name"
          done

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libavjs-custom-audio
          path: |
            vendor/libav.js/dist/libav-*-audio/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: vendor/libav.js/dist/libav-*-audio/*.zip
          generate_release_notes: true
